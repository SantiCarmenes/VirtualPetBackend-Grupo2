steps:
  # 1. Compilar la imagen
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/github.com/santicarmenes/virtualpetbackend-grupo2:$COMMIT_SHA', '.']
    dir: 'backend-virtualpet'

  # 2. Subir la imagen
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/github.com/santicarmenes/virtualpetbackend-grupo2:$COMMIT_SHA']

  # 3. Desplegar en Cloud Run 
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'virtualpet-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/github.com/santicarmenes/virtualpetbackend-grupo2:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'

images:
  - 'gcr.io/$PROJECT_ID/github.com/santicarmenes/virtualpetbackend-grupo2:$COMMIT_SHA'
