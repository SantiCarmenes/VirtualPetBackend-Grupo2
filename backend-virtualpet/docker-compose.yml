services:
  postgres:
    image: postgres:16-alpine
    container_name: virtualpet-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: virtualpet
      POSTGRES_PASSWORD: virtualpet
      POSTGRES_DB: virtualpet
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: